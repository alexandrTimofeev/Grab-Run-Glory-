# Custom Gradle props for smoother Windows/Android test builds with Unity.
# Unity replaces **JVM_HEAP_SIZE**, **STREAMING_ASSETS**, **ADDITIONAL_PROPERTIES** — keep those lines intact.
org.gradle.jvmargs=-Xmx**JVM_HEAP_SIZE**M -Dfile.encoding=UTF-8 --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.prefs/java.util.prefs=ALL-UNNAMED --add-opens=java.base/java.nio.charset=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED

org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configuration-cache=false
org.gradle.configureondemand=false
org.gradle.vfs.watch=false

android.overridePathCheck=true
android.useAndroidX=true
android.enableJetifier=true

unityStreamingAssets=**STREAMING_ASSETS**

**ADDITIONAL_PROPERTIES**
